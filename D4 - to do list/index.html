<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>To Do List</h1>

        <div class="row">
            <input type="text" id="taskIp">
            <button id="addBtn">Add</button>
        </div>

        <h3>Task List</h3>

        <ul id="taskList">
        </ul>

        <hr>

        <div class="status">
            Completed : <span id="comp">0</span> | 
            Uncompleted : <span id="uncomp">0</span>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
